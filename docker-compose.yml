version: '3.8'

services:
  pgvector:
    image: ankane/pgvector:v0.5.1
    container_name: urbanistica_pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: urbanistica
    ports:
      - "5432:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    restart: always

volumes:
  pgvector-data:
